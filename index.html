<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>BillVyapar</title>

    <!-- Preconnect to the API so the first fetch has no DNS/TLS cold-start -->
    <link rel="preconnect" href="https://accounts-8rx9.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts-8rx9.onrender.com" />

    <!-- Tell the browser to start fetching the React runtime before JS is parsed -->
    <link rel="modulepreload" href="/src/main.tsx" />
  </head>

  <body>
    <!-- Inline critical splash so there's zero blank-white flash before React mounts -->
    <div id="root">
      <div id="app-splash" style="
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        background:linear-gradient(135deg,#eff6ff 0%,#ffffff 50%,#f0fdf4 100%);
        z-index:9999;
      ">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1.2s ease-in-out infinite alternate">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        <span style="margin-top:12px;font-size:20px;font-weight:700;color:#1d4ed8;font-family:system-ui,sans-serif">BillVyapar</span>
      </div>
    </div>
    <style>
      @keyframes spin { from { opacity:.4; transform:scale(.9); } to { opacity:1; transform:scale(1); } }
      #app-splash { transition: opacity .2s; }
    </style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for asset caching
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      // Remove splash once React has painted its first frame
      document.addEventListener('DOMContentLoaded', () => {
        const splash = document.getElementById('app-splash');
        if (splash) {
          // React will replace #root content; watch for that
          const mo = new MutationObserver(() => {
            if (!document.getElementById('app-splash')) { mo.disconnect(); return; }
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 200);
            mo.disconnect();
          });
          mo.observe(document.getElementById('root'), { childList: true });
        }
      });
    </script>
  </body>
</html>
