services:
  - type: web
    name: billvyapar
    env: node
    buildCommand: npm ci --legacy-peer-deps && npm run build && npm ci --prefix backend --legacy-peer-deps
    startCommand: cd backend && node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 4000
